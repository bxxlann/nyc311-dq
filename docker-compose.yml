services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dq_pass}
      POSTGRES_DB: ${POSTGRES_DB:-nyc311}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
