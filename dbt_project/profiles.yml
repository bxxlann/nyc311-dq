nyc311_dq:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'nyc311') }}"
      user: "{{ env_var('POSTGRES_USER', 'dq_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'dq_pass') }}"
      schema: public
      threads: 4
